profile=fast
vo=gpu-next
hwdec=yes

scale=bilinear
cscale=bilinear
dscale=lanczos

interpolation=no
deband=no

cache=yes
cache-secs=60
demuxer-max-bytes=256M
keep-open=yes
pause=yes
save-position-on-quit

title-bar=yes

# Enable yt-dlp integration (default, but explicit for clarity)
ytdl=yes
script-opts=ytdl_hook-ytdl_path=/bin/yt-dlp

# Prefer H.264 up to 1080p for low CPU/GPU load on Ryzen; fallback to best available [web:14][web:17]
ytdl-format=bestvideo[height<=?1080][vcodec^=avc1]+bestaudio/best

# Pretend to be Chrome on Windows (widely accepted)
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"

# yt-dlp impersonate option (passed via MPV's ytdl-raw-options)
#ytdl-raw-options="impersonate=chrome:windows-10"








